name: CI and Windows Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pytest -v

  build-windows-exe:
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build exe
        run: |
          python scripts/build_exe.py

      - name: Archive packaged app
        run: |
          powershell -Command "Compress-Archive -Path 'dist/desktop-data-analyzer/*' -DestinationPath 'dist/desktop-data-analyzer-${{ github.ref_name }}-windows.zip' -Force"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-data-analyzer-${{ github.ref_name }}-windows
          path: dist/desktop-data-analyzer-${{ github.ref_name }}-windows.zip
